name: "Build and deploy material mkdocs to gh-pages"
on:
  workflow_call:

jobs:
  check_docs_files_change:
    name: "Check docs files changed"
    runs-on: ubuntu-latest
    outputs:
      DOCS_FILES_CHANGED: ${{ steps.docs_changed.outputs.any_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Check that docs changed
        id: docs_changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            docs/**
            mkdocs.yml
  deploy:
    needs: [ check_docs_files_change ]
    if: needs.check_docs_files_change.outputs.DOCS_FILES_CHANGED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: pip install mkdocs-minify-plugin
      - run: mkdocs gh-deploy --force
